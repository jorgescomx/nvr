<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Camera body -->
  <rect x="2" y="10" width="18" height="12" rx="3" fill="#3b82f6"/>
  <!-- Lens ring -->
  <circle cx="11" cy="16" r="4" fill="#1e2129"/>
  <circle cx="11" cy="16" r="2.5" fill="#0f1115"/>
  <circle cx="11" cy="16" r="1" fill="#3b82f6" opacity="0.7"/>
  <!-- Viewfinder -->
  <rect x="20" y="13" width="6" height="6" rx="1" fill="#2563eb"/>
  <!-- Mount arm -->
  <rect x="13" y="22" width="4" height="3" rx="1" fill="#2563eb"/>
  <rect x="10" y="25" width="10" height="2" rx="1" fill="#1d4ed8"/>
  <!-- Recording dot -->
  <circle cx="27" cy="9" r="3" fill="#ef4444"/>
  <circle cx="27" cy="9" r="1.5" fill="#fca5a5"/>
</svg>
