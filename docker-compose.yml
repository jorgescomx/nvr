services:
  nvr:
    build: .
    container_name: lightweight-nvr
    environment:
      - CONFIG_PATH=/config/config.json
      - GO2RTC_CONFIG_PATH=/config/go2rtc.yaml
      - ENCRYPTION_KEY_PATH=/config/encryption.key
      - REC_SECRET_KEY=change-me-to-something-long
      - TZ=America/New_York
    volumes:
      - ./config:/config
      - ./recordings:/recordings
      - ./frontend/dist:/app/frontend/dist
    ports:
      - "5000:5000"
    restart: unless-stopped

  go2rtc:
    image: alexxit/go2rtc:latest
    container_name: lightweight-go2rtc
    environment:
      - TZ=America/New_York
    volumes:
      - ./config:/config
    ports:
      - "1984:1984"
      - "8554:8554"
      - "8555:8555"
      - "8555:8555/udp"
    restart: unless-stopped
